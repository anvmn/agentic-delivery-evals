<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visit Log</title>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
  <script>
    var stored = [];
    try { stored = JSON.parse(localStorage.getItem('visits') || '[]'); } catch (e) {}
    var app = Elm.Main.init({ node: document.getElementById('app'), flags: stored });
    if (app.ports && app.ports.saveVisits) {
      app.ports.saveVisits.subscribe(function (visits) {
        localStorage.setItem('visits', JSON.stringify(visits));
      });
    }
  </script>
</body>
</html>
